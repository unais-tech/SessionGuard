<!DOCTYPE html>
<html>
<head>
    <title>SessionGuard — Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            width: 320px;
        }
        h2 { margin-top: 0; color: #333; }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .hint {
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>🔐 SessionGuard</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <label>Username</label>
            <input type="text" name="username" placeholder="admin or alice" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="password" required>
            <button type="submit">Login</button>
        </form>

        <div class="hint">
            Test accounts:<br>
            admin / admin123 (Admin)<br>
            alice / user123 (User)
        </div>
    </div>
</body>
</html>
